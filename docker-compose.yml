
services:

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile

    container_name: ekp-backend

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - ./data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile

    container_name: ekp-frontend

    env_file:
      - .env

    environment:
      BACKEND_URL: http://backend:8000/api/v1

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "8501:8501"

    restart: unless-stopped